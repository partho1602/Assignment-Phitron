<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink Corner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container my-5">

        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" id="search-input" class="form-control" placeholder="Search by name or first letter...">
                    <button class="btn btn-search" type="button" id="search-btn">Search</button>
                </div>
            </div>
        </div>


        <div class="row">

            <div class="col-lg-8">
                <div id="drinks-container" class="row g-4">

                </div>
            </div>

            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="cart-box p-4 rounded shadow-sm">
                    <h4 class="fw-bold mb-3">Total Cart: <span id="cart-count" class="badge bg-secondary">0</span></h4>
                    <table class="table table-borderless align-middle">
                        <thead>
                            <tr class="border-bottom text-muted">
                                <th>SL</th>
                                <th>Img</th>
                                <th>Name</th>
                            </tr>
                        </thead>
                        <tbody id="cart-items">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="drinkModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-dark">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modal-drink-name">Drink Title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center" id="modal-body-content">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
